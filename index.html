<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Un fetch</title>
 <style>
    body {
        font-family: "Segoe UI", Tahoma, Arial, sans-serif;
        background-color: #f4f8fb;
        margin: 20px;
        color: #1f2d3d;
    }

    h1 {
        text-align: center;
        color: #1a4f7a;
    }

    table {
        width: 80%;
        margin: 20px auto;
        border-collapse: collapse;
        background-color: #ffffff;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        overflow: hidden;
    }

    thead {
        background-color: #2b6cb0;
        color: white;
    }

    th, td {
        padding: 12px 15px;
        text-align: left;
    }

    th {
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    tbody tr {
        border-bottom: 2px solid #e2e8f0;
        transition: background-color 0.2s ease;
    }

    tbody tr:hover {
        background-color: #ebf4ff;
    }

    tbody tr:nth-child(even) {
        background-color: #f7fbff;
    }

    td {
        color: #2d3748;
    }
</style>
    </head>
    <body>
        <h1>Electivos</h1>
        <table>
		    <thead>
			    <tr>
				    <th>Asignatura</th>
					<th>Grupo</th>
					<th>Enfoque</th>
				</tr>
			</thead>
			<tbody></tbody>
        </table>

        <script>
			const t = document.querySelector("tbody");
            const URL = "https://api.myjson.online/v1/records/09af800a-f997-4102-a50f-69857ad97fa8";
            fetch(URL)
    .then((respuesta) => {
        if (!respuesta.ok) {
            throw new Error("Error HTTP: " + respuesta.status);
        }
        return respuesta.json();
    })
    .then((datos) => {
                var trabajo = datos.data;

                trabajo.forEach((x) => {
                    if (x.ok == 1) {
                        t.innerHTML += `
                            <tr>
                                <td>${x.name}</td>
                                <td>${x.group}</td>
                                <td>${x.focus}</td>
                            </tr>
                        `;
                    }
                });
            })
    .catch((error) => {
        console.error("Algo salió mal:", error);
    });
        </script>
    </body>
</html>
